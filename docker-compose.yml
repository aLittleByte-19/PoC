services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - app
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - poc

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    environment:
      COMPOSER_INSTALL_ON_STARTUP: ${COMPOSER_INSTALL_ON_STARTUP:-true}
      LARAVEL_AUTOMATED_SETUP: ${LARAVEL_AUTOMATED_SETUP:-true}
      LARAVEL_SETUP_RETRIES: ${LARAVEL_SETUP_RETRIES:-30}
      FILAMENT_ADMIN_CREATE: ${FILAMENT_ADMIN_CREATE:-true}
      FILAMENT_ADMIN_NAME: ${FILAMENT_ADMIN_NAME:-NEXUM Admin}
      FILAMENT_ADMIN_EMAIL: ${FILAMENT_ADMIN_EMAIL:-admin@nexum.local}
      FILAMENT_ADMIN_PASSWORD: ${FILAMENT_ADMIN_PASSWORD:-Password123!}
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
      - redis
      - minio
      - mailpit
    networks:
      - poc

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=120
    environment:
      COMPOSER_INSTALL_ON_STARTUP: ${COMPOSER_INSTALL_ON_STARTUP:-true}
      LARAVEL_WAIT_FOR_SETUP: ${LARAVEL_WAIT_FOR_SETUP:-true}
      LARAVEL_SETUP_WAIT_SECONDS: ${LARAVEL_SETUP_WAIT_SECONDS:-120}
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - poc

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    command: sh -lc "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      COMPOSER_INSTALL_ON_STARTUP: ${COMPOSER_INSTALL_ON_STARTUP:-true}
      LARAVEL_WAIT_FOR_SETUP: ${LARAVEL_WAIT_FOR_SETUP:-true}
      LARAVEL_SETUP_WAIT_SECONDS: ${LARAVEL_SETUP_WAIT_SECONDS:-120}
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - poc

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-nexum}
      POSTGRES_USER: ${DB_USERNAME:-nexum}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexum}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - poc

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - poc

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - poc

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do
        sleep 2;
      done;
      mc mb --ignore-existing local/${MINIO_BUCKET:-nexum-local};
      "
    networks:
      - poc

  mailpit:
    image: axllent/mailpit:v1.24
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - poc

  ai-worker:
    build:
      context: ./ai-worker
    environment:
      AI_WORKER_ENV: ${AI_WORKER_ENV:-local}
      OCR_DRIVER: ${DOCUMENT_OCR_DRIVER:-local}
      ANALYSIS_DRIVER: ${DOCUMENT_CLASSIFIER_DRIVER:-fake}
      POC_CONFIDENCE_THRESHOLD: ${POC_CONFIDENCE_THRESHOLD:-80}
      TEXTRACT_ENABLED: ${TEXTRACT_ENABLED:-false}
      BEDROCK_ENABLED: ${BEDROCK_ENABLED:-false}
    ports:
      - "${AI_WORKER_PORT:-8001}:8000"
    networks:
      - poc

networks:
  poc:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
