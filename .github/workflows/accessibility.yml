name: Accessibility

on:
  push:
    branches:
      - develop
      - main
      - migration/full-blade
  pull_request:

jobs:
  accessibility:
    name: Axe and Pa11y
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm ci --ignore-scripts=false

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start application
        run: docker compose up -d --build

      - name: Wait for application
        run: |
          for attempt in {1..120}; do
            if curl --silent --fail http://localhost:8080 > /dev/null; then
              exit 0
            fi

            sleep 2
          done

          docker compose logs
          exit 1

      - name: Run axe
        run: node scripts/a11y/axe-playwright.mjs http://localhost:8080 http://localhost:8080/admin

      - name: Run Pa11y
        run: |
          npx pa11y http://localhost:8080
          npx pa11y http://localhost:8080/admin

      - name: Stop application
        if: always()
        run: docker compose down --volumes --remove-orphans
